# Claudius Configuration
# Copy to config.yaml and customize

claude_code:
  workspace: ~/claudius
  model: opus
  headless: true
  max_retries: 3
  session_timeout: 3600

bridges:
  slack:
    enabled: true
    bot_token: ${SLACK_BOT_TOKEN}
    app_token: ${SLACK_APP_TOKEN}
    allowed_users:
      - ${SLACK_ALLOWED_USERS}
    allowed_channels:
      - ${SLACK_ALLOWED_CHANNELS}
  telegram:
    enabled: false

scheduler:
  enabled: true
  timezone: America/New_York
  jobs:
    - name: health-check
      skill: system-health
      cron: "*/30 * * * *"
      enabled: true
    - name: daily-report
      skill: daily-report
      cron: "0 8 * * 1-5"
      enabled: true
    - name: market-prep
      skill: market-prep
      cron: "0 17 * * 0"
      enabled: false

memory:
  backend: sqlite
  db_path: memory/claudius.db
  markdown_path: memory/MEMORY.md
  max_context_tokens: 50000
  conversation_log: true
  conversation_path: memory/conversations/

skills:
  path: skills/
  auto_reload: true

triune_brain:
  enabled: true
  vigil:
    host: gx10-b71c
    ollama_port: 11434
    ssh_user: ""
  lumen:
    host: desktop-rssp6ga-1
    ssh_user: ""
  echelon:
    host: avs-dellxps
    ssh_user: ""
  forex_agent_repo: ~/forex-agent

daemon:
  pid_file: /tmp/claudius.pid
  log_level: INFO
  log_file: logs/claudius.log
  watchdog:
    enabled: true
    restart_delay: 5
    max_restarts: 10
