services:
  claudius:
    build: .
    container_name: claudius
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./skills:/app/skills:ro
      - ./prompts:/app/prompts:ro
      - ./memory:/app/memory
      - ./logs:/app/logs
      - ~/.ssh:/home/claudius/.ssh:ro        # SSH keys for Triune Brain access
      - ~/.claude:/home/claudius/.claude:ro   # Claude Code auth
    network_mode: host  # Access Tailscale network directly
    environment:
      - TZ=America/New_York
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/tmp/claudius.pid') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
